services:
    watchtower:
        image: containrrr/watchtower:latest
        container_name: watchtower

        restart: unless-stopped

        command:
            - "--label-enable"
            - "--cleanup"
            - "--interval=300"

        labels:
            com.centurylinklabs.watchtower.enable: "true"

        environment:
            TZ: ${TZ}

        volumes:
            - /var/run/docker.sock:/var/run/docker.sock

        network_mode: none
